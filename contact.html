<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="contact.css">
    
</head>
<body>
    <header>
        <h1 class="site-name">Brian Purdy</h1>
        <nav id="header-nav">
            <ul class="navigation-items">
                <li class="navigation-item"><a href="index.html">Home</a></li>
                
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact" aria-roledescription="Contact form.">
            <form action="mailto:brianpurdy01@gmail.com" method="post" enctype="text/plain" onsubmit="redirectAfterDelay()">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required><br><br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required><br><br>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea><br><br>
                <!-- style="width: 100%; height: 100px; -->
                <button type="submit">Send</button>
            </form>
        </section>
        <section id="sent">
            <h2>Thank you for your message!</h2>
            <p>Returning to the homepage...</p>
            <a href="index.html" ></a>
        </section>
    </main>

    <footer>
        <p>Copyright 2024</p>
    </footer>

    <script src='contact.js' defer></script>

</body>
</html>
